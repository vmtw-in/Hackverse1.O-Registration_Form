<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hackverse 1.O Admin Login</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg, #0f172a, #1e293b, #312e81);
      overflow:hidden;
      padding:20px;
    }

    .bg-orb{
      position:fixed;
      border-radius:50%;
      filter:blur(50px);
      opacity:.35;
      animation:float 10s ease-in-out infinite;
      z-index:0;
    }

    .orb1{
      width:260px;
      height:260px;
      background:#38bdf8;
      top:8%;
      left:8%;
    }

    .orb2{
      width:300px;
      height:300px;
      background:#8b5cf6;
      bottom:10%;
      right:8%;
      animation-delay:2s;
    }

    .orb3{
      width:220px;
      height:220px;
      background:#22c55e;
      top:55%;
      left:18%;
      animation-delay:4s;
    }

    @keyframes float{
      0%,100%{ transform:translateY(0) translateX(0) scale(1); }
      50%{ transform:translateY(-18px) translateX(10px) scale(1.04); }
    }

    .login-card{
      position:relative;
      z-index:1;
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.18);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border-radius:24px;
      padding:32px 26px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
      color:#fff;
    }

    .brand{
      text-align:center;
      margin-bottom:24px;
    }

    .brand-badge{
      width:72px;
      height:72px;
      margin:0 auto 14px;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      font-weight:700;
      background:linear-gradient(135deg, #38bdf8, #8b5cf6);
      box-shadow:0 10px 24px rgba(56,189,248,.28);
    }

    .brand h1{
      font-size:28px;
      margin-bottom:8px;
    }

    .brand p{
      font-size:14px;
      color:rgba(255,255,255,.82);
      line-height:1.5;
    }

    .form-group{
      margin-bottom:16px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:600;
      color:#e2e8f0;
    }

    input{
      width:100%;
      padding:14px 14px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,.14);
      color:#fff;
      font-size:15px;
      border:1px solid rgba(255,255,255,.12);
      transition:.25s ease;
    }

    input::placeholder{
      color:rgba(255,255,255,.62);
    }

    input:focus{
      transform:translateY(-1px);
      border-color:#7dd3fc;
      box-shadow:0 0 0 4px rgba(56,189,248,.14);
      background:rgba(255,255,255,.18);
    }

    .login-btn{
      width:100%;
      margin-top:10px;
      padding:14px 16px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      font-size:16px;
      font-weight:700;
      color:#fff;
      background:linear-gradient(135deg, #06b6d4, #7c3aed);
      box-shadow:0 12px 26px rgba(124,58,237,.28);
      transition:.25s ease;
    }

    .login-btn:hover{
      transform:translateY(-2px);
    }

    .login-btn:active{
      transform:translateY(0);
    }

    .error-message{
      display:none;
      margin-top:14px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      line-height:1.5;
      background:rgba(239,68,68,.18);
      border:1px solid rgba(239,68,68,.35);
      color:#fecaca;
    }

    .hint{
      margin-top:18px;
      text-align:center;
      font-size:12px;
      color:rgba(255,255,255,.68);
    }

    @media (max-width: 480px){
      .login-card{
        padding:26px 18px;
        border-radius:20px;
      }

      .brand h1{
        font-size:23px;
      }

      .brand p{
        font-size:13px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="login-card">
    <div class="brand">
      <div class="brand-badge">H</div>
      <h1>Admin Login</h1>
      <p>Hackverse 1.O dashboard secure sign in panel</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Admin Username</label>
        <input type="text" id="username" placeholder="Enter admin username" required />
      </div>

      <div class="form-group">
        <label for="password">Admin Password</label>
        <input type="password" id="password" placeholder="Enter admin password" required />
      </div>

      <button type="submit" class="login-btn">Login to Dashboard</button>
      <div class="error-message" id="errorMessage">Invalid username or password.</div>
    </form>

    <div class="hint">Use your admin credentials to continue</div>
  </div>

  <script>
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "admin123";

    const SESSION_KEY = "isAdminLoggedIn";
    const SESSION_TIME_KEY = "adminLastActivity";
    const SESSION_USER_KEY = "adminUser";

    const DASHBOARD_PAGE = "admin.html";

    const loginForm = document.getElementById("loginForm");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const errorMessage = document.getElementById("errorMessage");

    function showError(message){
      errorMessage.style.display = "block";
      errorMessage.textContent = message;
    }

    function hideError(){
      errorMessage.style.display = "none";
    }

    function loginAdmin(username){
      localStorage.setItem(SESSION_KEY, "true");
      localStorage.setItem(SESSION_TIME_KEY, String(Date.now()));
      localStorage.setItem(SESSION_USER_KEY, username);
      window.location.href = DASHBOARD_PAGE;
    }

    loginForm.addEventListener("submit", function(e){
      e.preventDefault();
      hideError();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      if(username === ADMIN_USERNAME && password === ADMIN_PASSWORD){
        loginAdmin(username);
      } else {
        showError("Wrong admin username or password.");
      }
    });

    if(localStorage.getItem(SESSION_KEY) === "true"){
      window.location.href = DASHBOARD_PAGE;
    }
  </script>
</body>
</html>
