<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Hackverse</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#020617;
  box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.logout-btn{
  background:red;
  border:none;
  padding:10px 16px;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* TABLE */
.container{
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:left;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

tr:hover{
  background:rgba(255,255,255,0.1);
  cursor:pointer;
}

/* SIDE PANEL */
.side-panel{
  position:fixed;
  right:-100%;
  top:0;
  width:350px;
  height:100%;
  background:#020617;
  padding:20px;
  transition:0.4s;
  overflow:auto;
  box-shadow:-10px 0 20px rgba(0,0,0,0.5);
}

.side-panel.active{
  right:0;
}

.close-btn{
  float:right;
  cursor:pointer;
  color:red;
}

/* DELETE */
.delete-btn{
  background:red;
  padding:10px;
  border:none;
  color:white;
  width:100%;
  margin-top:20px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .side-panel{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="header">
  <h2>Admin Dashboard</h2>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">
  <table id="dataTable">
    <thead>
      <tr>
        <th>S.No</th>
        <th>Team Name</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- SIDE PANEL -->
<div class="side-panel" id="panel">
  <span class="close-btn" onclick="closePanel()">✖</span>
  <h3>Application Details</h3>
  <div id="details"></div>
  <button class="delete-btn" onclick="deleteRow()">Delete</button>
</div>

<script>

/* ================= LOGIN CHECK ================= */

const LOGIN_PAGE = "admin-login.html"; // FIXED

if(localStorage.getItem("isAdminLoggedIn") !== "true"){
  window.location.href = LOGIN_PAGE;
}

/* ================= LOGOUT ================= */

function logout(){
  localStorage.clear();
  window.location.href = LOGIN_PAGE;
}

/* ================= FETCH DATA ================= */

/* 👉 Replace with your Web App URL */
const API_URL = "https://script.google.com/macros/s/AKfycbwcmYkwGgM-gFYzTsq6aTkJ01cqF4o93OJlwgxidh5jsi5crxw4RzFlpJzVzElrbOLAhA/exec";

let allData = [];
let currentIndex = null;

async function loadData(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();

    allData = data;
    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";

    data.forEach((row,index)=>{
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${index+1}</td>
        <td>${row["Team Name"] || "-"}</td>
      `;

      tr.onclick = ()=>openPanel(index);

      tbody.appendChild(tr);
    });

  }catch(err){
    alert("Error loading data");
    console.log(err);
  }
}

/* ================= PANEL ================= */

function openPanel(index){
  currentIndex = index;

  const row = allData[index];
  const panel = document.getElementById("panel");
  const details = document.getElementById("details");

  let html = "";

  for(let key in row){
    html += `<p><b>${key}:</b> ${row[key]}</p>`;
  }

  /* SHOW PAYMENT SCREENSHOT */
  if(row["Payment Screenshot File URL"]){
    html += `<img src="${row["Payment Screenshot File URL"]}" width="100%">`;
  }

  details.innerHTML = html;
  panel.classList.add("active");
}

function closePanel(){
  document.getElementById("panel").classList.remove("active");
}

/* ================= DELETE ================= */

async function deleteRow(){
  if(currentIndex === null) return;

  const confirmDelete = confirm("Delete this entry?");
  if(!confirmDelete) return;

  const id = allData[currentIndex]["Application ID"];

  await fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      id:id
    })
  });

  alert("Deleted");
  closePanel();
  loadData();
}

/* ================= LOAD ================= */
loadData();

</script>

</body>
</html>
